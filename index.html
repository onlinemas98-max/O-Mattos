<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Indisponível</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            max-width: 520px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 16px;
        }

        .status {
            margin-top: 20px;
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>⚠️ Site Temporariamente Fora do Ar</h1>
    
    <p>Este site encontra-se temporariamente indisponível devido à falta de pagamento da mensalidade de hospedagem/manutenção.</p>
    
    <p>O serviço será restabelecido automaticamente após a regularização.</p>
    
    <div class="status">
        Para mais informações, entre em contato com o responsável pelo site.
    </div>
</div>

</body>
</html>
